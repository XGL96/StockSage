name: StockSage 每日股票分析

on:
  # 定时触发 - 工作日北京时间 16:00 (UTC 08:00)，收盘后数据最完整
  schedule:
    - cron: '0 8 * * 1-5'

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full           # 完整分析（DSA + FinGenius 博弈）
          - dsa-only       # 仅 daily_stock_analysis 分析
          - fg-only        # 仅 FinGenius 博弈分析
          - market-only    # 仅大盘复盘
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stocksage-analysis
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 创建虚拟环境并安装依赖
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p reports logs

      - name: 写入配置文件
        run: |
          if [ -z "$STOCKSAGE_CONFIG" ]; then
            echo "::error::STOCKSAGE_CONFIG secret 未配置。请在 Settings > Secrets 中添加。"
            exit 1
          fi
          echo "$STOCKSAGE_CONFIG" > config.yaml
          echo "配置文件已写入"
        env:
          STOCKSAGE_CONFIG: ${{ secrets.STOCKSAGE_CONFIG }}

      - name: 执行分析
        run: |
          source .venv/bin/activate

          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          echo "=========================================="
          echo "StockSage 统一股票分析系统"
          echo "=========================================="
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "模式: $MODE"
          echo "=========================================="

          python main.py --mode "$MODE" $FORCE_RUN_ARG

      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stocksage-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 清理敏感文件
        if: always()
        run: rm -f config.yaml FinGenius/config/config.toml

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "未生成报告文件"
          fi
